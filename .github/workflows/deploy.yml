name: Deploy to GitHub Pages

on:
  # Trigger on pushes to the main branch
  push:
    branches: [ main ]
  # Allow manual trigger from Actions tab with customizable inputs
  workflow_dispatch:
    inputs:
      base_path:
        description: "Base path for GitHub Pages (e.g., '/' for user/org pages, '/repo-name/' for project pages)"
        required: false
        default: "/"
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUILD_PATH: "."

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Set base path
        id: base-path
        run: |
          if [ -z "${{ github.event.inputs.base_path }}" ]; then
            echo "path=/" >> $GITHUB_OUTPUT
          else
            echo "path=${{ github.event.inputs.base_path }}" >> $GITHUB_OUTPUT
          fi

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        env:
          BASE_PATH: ${{ steps.base-path.outputs.path }}
        with:
          path: ${{ env.BUILD_PATH }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
